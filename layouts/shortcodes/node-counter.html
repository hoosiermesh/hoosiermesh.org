{{- $data := index site.Data "node-count" -}}
{{- $count := 0 -}}
{{- with $data -}}
{{- $count = .nodeCount | default 0 -}}
{{- end -}}
<div class="node-counter" data-node-counter data-node-duration="3000" data-node-counter-url="/api/node-count" data-node-fallback-url="/api/node-count.json">
<div class="node-counter__label">Total nodes</div>
<div class="node-counter__value">
<span data-node-count>{{ $count }}</span>
<span class="node-counter__plus" aria-hidden="true">+</span>
</div>
</div>
